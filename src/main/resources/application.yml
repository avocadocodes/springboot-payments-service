server:
  port: ${PORT:8080}

spring:
  application:
    name: payments-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payments}}
    username: ${DB_USER:payments}
    password: ${DB_PASSWORD:payments}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          min-idle: 1

payments:
  idempotency:
    ttl-hours: 24

resilience4j:
  retry:
    instances:
      paymentGateway:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - com.nikita.payments.exception.GatewayException
        ignore-exceptions: []

  circuitbreaker:
    instances:
      paymentGateway:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 2s
        record-exceptions:
          - com.nikita.payments.exception.GatewayException

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, circuitbreakers
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.nikita.payments: INFO
    org.springframework.web: WARN
