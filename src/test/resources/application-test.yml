spring:
  datasource:
    url: jdbc:h2:mem:paymentstest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

resilience4j:
  retry:
    instances:
      paymentGateway:
        max-attempts: 1
  circuitbreaker:
    instances:
      paymentGateway:
        sliding-window-size: 5
        minimum-number-of-calls: 3

payments:
  idempotency:
    ttl-hours: 1

logging:
  level:
    com.nikita.payments: DEBUG
